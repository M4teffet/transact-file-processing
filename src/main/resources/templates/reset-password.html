<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Réinitialisation - Orange Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <link href="/images/favicon.ico" rel="shortcut icon"/>
    <script src="/javascript/lucide.min.js"></script>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <img alt="Orange Bank" class="auth-logo"
             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/f/fb/Logo_Orange_Bank.svg'"
             src="/images/Logo_Orange_Bank.svg">
        <div class="auth-eyebrow">Réinitialisation</div>
        <h1 class="auth-title">Nouveau mot de passe</h1>
        <p class="auth-subtitle">Choisissez un mot de passe sécurisé</p>
    </div>
    <div class="auth-invalid" id="invalidBox">
        <i data-lucide="link-2-off" style="width:28px;height:28px;color:#dc2626;margin:0 auto .75rem;display:block"></i>
        <p style="font-size:.88rem;color:#991b1b;font-weight:700;margin-bottom:.4rem">Lien invalide ou expiré</p>
        <p style="font-size:.78rem;color:#64748b;margin-bottom:.85rem">Ce lien de réinitialisation n'est plus
            valide.</p>
        <a class="auth-link" href="/forgot-password">&rarr; Demander un nouveau lien</a>
    </div>
    <form id="resetForm">
        <div class="auth-group">
            <label class="auth-label" for="newPwd">Nouveau mot de passe</label>
            <input autocomplete="new-password" class="auth-input auth-input-pwd" id="newPwd"
                   oninput="checkStrength(this.value)" required type="password">
            <button aria-label="Afficher" class="eye-btn" data-target="newPwd" type="button"><i data-lucide="eye-off"
                                                                                                style="width:15px;height:15px"></i>
            </button>
            <div class="strength-meter">
                <div class="strength-bar" id="meterBar"></div>
<script src="/javascript/reset-password.js"></script>
                <script>if(window.lucide)lucide.createIcons();</script>
</body>
</html>
