{#include layout}
{#title}Audit Trail - FLUX{/title}
{#aside}
{#include sidebar-admin/}
{/aside}
{#default}

<div class="max-w-7xl mx-auto" style="display:flex;flex-direction:column;gap:var(--section-gap);">

    <!-- Page header -->
    <div class="page-header">
        <div>
            <h2 class="page-title">Journal d'audit</h2>
            <p class="page-subtitle">Toutes les actions administratives enregistrées</p>
        </div>
        <div class="flex items-center gap-2">
            <button class="btn-flux" onclick="loadAudit()">
                <i data-lucide="refresh-cw" style="width:13px;height:13px"></i>Actualiser
            </button>
            <button class="btn-flux btn-flux-primary" onclick="exportAudit()">
                <i data-lucide="file-text" style="width:13px;height:13px"></i>Exporter (HTML)
            </button>
        </div>
    </div>

    <!-- Filters -->
    <div class="panel">
        <div class="panel-head">
            <h3><i data-lucide="filter"></i> Filtres</h3>
        </div>
        <div class="panel-body">
            <div class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-6 gap-4">
                <div>
                    <label class="form-label">Type d'action</label>
                    <select id="auditActionFilter" onchange="loadAudit()" class="form-select">
                        <option value="">Toutes les actions</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Effectué par</label>
                    <select id="auditPerformedBy" onchange="loadAudit()" class="form-select">
                        <option value="">Tous les utilisateurs</option>
                    </select>
                </div>
                <div>
                    <label class="form-label">Cible</label>
                    <input id="auditTarget" oninput="debouncedLoad()" placeholder="Utilisateur, lot…"
                           class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Du</label>
                    <input id="auditFrom" type="date" onchange="loadAudit()" class="form-input"/>
                </div>
                <div>
                    <label class="form-label">Au</label>
                    <input id="auditTo" type="date" onchange="loadAudit()" class="form-input"/>
                </div>
                <div style="display:flex;align-items:flex-end;gap:6px">
                    <button class="btn-flux" onclick="clearAuditFilters()" style="flex:1;justify-content:center">
                        <i data-lucide="x" style="width:13px;height:13px"></i>Réinitialiser
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Table -->
    <div class="panel">
        <div class="panel-head" style="display:flex;align-items:center;justify-content:space-between">
            <h3><i data-lucide="shield-check"></i> Événements</h3>
            <span id="auditCount" style="font-size:var(--text-xs);color:var(--ink-3)"></span>
        </div>

        <div style="overflow-x:auto">
            <table class="data-table">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Action</th>
                        <th>Effectué par</th>
                        <th>Cible</th>
                        <th>Description</th>
                    </tr>
                </thead>
                <tbody id="auditTbody">
                    <tr><td colspan="5" style="padding:0"><div class="state-block state-compact"><svg class="state-spin" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="10" stroke="currentColor" stroke-width="3" opacity="0.25"/><path d="M12 2a10 10 0 0 1 10 10" stroke="currentColor" stroke-width="3" stroke-linecap="round"/></svg><span>Chargement…</span></div></td></tr>
                </tbody>
            </table>
        </div>
        <div id="auditPagination"></div>
    </div>

</div>
{/default}
{#script}
<script src="/javascript/audit.js"></script>
{/script}
