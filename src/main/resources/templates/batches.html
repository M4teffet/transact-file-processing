{#include layout}
    {#title}Mes Batches - Orange Bank{/title}

    {#head}{/head}

{#aside}
{#insert aside}{#include sidebar-inputter/}{/insert}
{/aside}

{#default}
    <div class="max-w-7xl mx-auto" style="display:flex;flex-direction:column;gap:24px">

        <!-- KPI cards -->
        <div class="grid grid-cols-1 md:grid-cols-2 gap-3">
            <!-- Total Chargés -->
            <div style="position:relative;overflow:hidden;border:0.5px solid #e5e7eb;background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between">
                <!-- Decorative circles -->
                <svg style="position:absolute;right:-10px;top:-10px;opacity:.06;pointer-events:none" width="100"
                     height="100" viewBox="0 0 100 100">
                    <circle cx="80" cy="20" r="40" fill="#e86e00"/>
                    <circle cx="60" cy="60" r="25" fill="#e86e00"/>
                </svg>
                <div>
                    <p style="font-size:12px;color:#6b7280;margin-bottom:4px">Total Chargés</p>
                    <p style="font-size:26px;font-weight:300;color:#e86e00;line-height:1;font-variant-numeric:tabular-nums"
                       id="uploadedCount">0</p>
            </div>
                <i data-lucide="cloud-upload"
                   style="width:32px;height:32px;color:#e86e00;opacity:.35;flex-shrink:0"></i>
            </div>
            <!-- Total Validés -->
            <div style="position:relative;overflow:hidden;border:0.5px solid #e5e7eb;background:#fff;padding:16px 20px;display:flex;align-items:center;justify-content:space-between">
                <svg style="position:absolute;right:-10px;top:-10px;opacity:.06;pointer-events:none" width="100"
                     height="100" viewBox="0 0 100 100">
                    <circle cx="80" cy="20" r="40" fill="#059669"/>
                    <circle cx="60" cy="60" r="25" fill="#059669"/>
                </svg>
                <div>
                    <p style="font-size:12px;color:#6b7280;margin-bottom:4px">Total Validés</p>
                    <p style="font-size:26px;font-weight:300;color:#059669;line-height:1;font-variant-numeric:tabular-nums"
                       id="validatedCount">0</p>
            </div>
                <i data-lucide="circle-check-big"
                   style="width:32px;height:32px;color:#059669;opacity:.35;flex-shrink:0"></i>
        </div>
    </div>

        <!-- Batch table -->
        <div class="bg-white rounded-md shadow-xs border border-gray-200 p-8">
            <div class="flex items-center gap-3">
                <i class="w-5 h-5 text-orange-600" data-lucide="list"></i>
                <h3 class="text-sm font-semibold text-gray-700">Liste des Batches Uploadés</h3>
                <div id="batchSearchAnchor" style="margin-left:auto"></div>
        </div>
            <div class="divide-y divide-gray-200" id="uploadedBatchesContainer"></div>
    </div>
</div>
{/default}

{#script}
<script src="/javascript/batches.js"></script>
<script>lucide.createIcons();</script>
{/script}

{/include}
