worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events { worker_connections 1024; }

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" "$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    sendfile on;
    keepalive_timeout 65;
    client_max_body_size 20M;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/javascript;
    gzip_min_length 1024;

    limit_req_zone $binary_remote_addr zone=login:10m rate=10r/m;

    upstream quarkus {
        server transact-app:8080;
        keepalive 32;
    }

    # ── HTTP → HTTPS redirect (with correct external port) ────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host:8443$request_uri;
    }

    # ── HTTPS main server ─────────────────────────────────────────────────────
    server {
        listen 443 ssl;
        server_name _;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 10m;

        add_header Strict-Transport-Security "max-age=31536000" always;
        add_header X-Frame-Options DENY always;
        add_header X-Content-Type-Options nosniff always;
        add_header Referrer-Policy no-referrer-when-downgrade always;

        # Rewrite any redirect Quarkus generates (http://internal → https://external:8443)
        proxy_redirect http://transact-app:8080/ https://$host:8443/;
        proxy_redirect http://$host/ https://$host:8443/;

        location = /api/login {
            limit_req zone=login burst=5 nodelay;
            proxy_pass http://quarkus;
            include /etc/nginx/proxy_params;
        }

        location / {
            proxy_pass http://quarkus;
            include /etc/nginx/proxy_params;
        }
    }
}
