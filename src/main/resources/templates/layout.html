<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{#insert title}FLUX Orange Bank{/insert}</title>
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="/javascript/lucide.min.js"></script>
    <link href="/images/favicon.ico" rel="shortcut icon"/>
    <link href="/css/app.css" rel="stylesheet">
    {#insert head}{/insert}
</head>

<body class="bg-gray-100 antialiased min-h-screen flex">
<div class="fixed inset-0 z-40 bg-black/50 lg:hidden hidden" id="mobile-overlay"></div>

{#insert aside}{/insert}

<div class="flex-1 flex flex-col overflow-hidden lg:ml-64">

    <!-- Topbar -->
    <header class="flex-shrink-0"
            style="background:#0f172a;border-bottom:1px solid #1e293b;border-top:3px solid #f97316;position:relative;overflow:visible;z-index:50">
        <div style="position:absolute;inset:0;opacity:.04;pointer-events:none;background-image:repeating-linear-gradient(0deg,#fff 0,#fff 1px,transparent 1px,transparent 36px),repeating-linear-gradient(90deg,#fff 0,#fff 1px,transparent 1px,transparent 36px)"></div>
        <div class="px-5 py-2.5 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <button aria-label="Menu" class="lg:hidden p-1.5 transition" id="sidebar-toggle" style="color:#94a3b8">
                    <i class="w-4 h-4" data-lucide="menu"></i>
                </button>
                <div class="flex items-center gap-2">
                    <div class="w-6 h-6 bg-orange-500 flex items-center justify-center flex-shrink-0"
                         style="border-radius:2px">
                        <span class="text-white font-black" style="font-size:.58rem;letter-spacing:-.01em">FX</span>
                    </div>
                    <span style="font-size:.8rem;font-weight:700;color:#fff;letter-spacing:.05em">FLUX <span
                            style="color:#f97316">·</span> Orange Bank</span>
                </div>
            </div>
            <div class="relative" id="user-menu-wrapper">
                <button class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-white/10 transition"
                        onclick="toggleUserDropdown()">
                    <div class="w-6 h-6 bg-orange-500 flex items-center justify-center flex-shrink-0"
                         style="border-radius:2px">
                        <span class="text-white font-black" id="header-user-initials" style="font-size:.58rem">?</span>
                    </div>
                    <div class="hidden sm:block text-left leading-tight">
                        <p class="font-semibold" id="header-username" style="font-size:.78rem;color:#fff">—</p>
                        <p class="uppercase" id="header-role"
                           style="font-size:.6rem;color:#64748b;letter-spacing:.06em">—</p>
                    </div>
                    <i data-lucide="chevron-down" style="width:.75rem;height:.75rem;color:#64748b"></i>
                </button>
                <div id="user-dropdown"
                     style="display:none;position:absolute;right:0;top:calc(100% + 4px);width:215px;background:#fff;border:1px solid #e2e8f0;border-radius:2px;box-shadow:0 8px 24px rgba(0,0,0,.25);z-index:9999;overflow:hidden">
                    <div style="padding:.65rem .75rem;border-bottom:1px solid #1e293b;background:#0f172a">
                        <p id="dropdown-username" style="font-size:.82rem;font-weight:700;color:#fff">—</p>
                        <p id="dropdown-role" style="font-size:.68rem;color:#94a3b8;margin-top:2px">—</p>
                    </div>
                    <div style="padding:4px 0">
                        <a href="/change-password"
                           onmouseout="this.style.background='transparent';this.style.color='#334155'"
                           onmouseover="this.style.background='#fff7ed';this.style.color='#c2410c'"
                           style="font-size:.78rem;display:flex;align-items:center;gap:8px;padding:8px 12px;color:#334155;text-decoration:none">
                            <i data-lucide="key-round" style="width:14px;height:14px;color:#94a3b8;flex-shrink:0"></i>
                            Changer le mot de passe
                        </a>
                        <div style="border-top:1px solid #f1f5f9;margin:4px 0"></div>
                        <button onclick="logoutUser()"
                                onmouseout="this.style.background='transparent'"
                                onmouseover="this.style.background='#fef2f2'"
                                style="font-size:.78rem;width:100%;display:flex;align-items:center;gap:8px;padding:8px 12px;color:#dc2626;background:none;border:none;cursor:pointer;text-align:left;font-family:inherit">
                            <i data-lucide="log-out" style="width:14px;height:14px;flex-shrink:0"></i> Déconnexion
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
        {#insert default}{/insert}
    </main>
</div>

<!-- Delete modal -->
<div class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center" id="deleteConfirmationModal">
    <div class="bg-white shadow-xl p-5 max-w-md mx-4 w-full">
        <h3 class="font-bold text-gray-900 mb-2" style="font-size:1rem;">Confirmer la suppression</h3>
        <p class="text-gray-600 mb-5" style="font-size:.85rem;">Voulez-vous vraiment supprimer ce batch ? Cette action
            est irréversible.</p>
        <div class="flex justify-end gap-2">
            <button class="px-3 py-1.5 text-gray-700 bg-gray-100 hover:bg-gray-200 transition"
                    onclick="cancelDelete()" style="font-size:.85rem;">Annuler
            </button>
            <button class="px-3 py-1.5 text-white bg-red-600 hover:bg-red-700 transition"
                    onclick="confirmDelete()" style="font-size:.85rem;">Supprimer
            </button>
        </div>
    </div>
</div>

<!-- Batch details modal -->
<div class="fixed inset-0 hidden items-center justify-center z-50" id="batchDetailsModal"
     onclick="if(event.target===this)closeModal('batchDetailsModal')">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative bg-white w-11/12 max-w-6xl shadow-xl p-5 z-10 overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-semibold text-gray-900" style="font-size:1rem;">Détails du batch</h2>
            <button class="p-1.5 rounded hover:bg-gray-100 text-gray-500 transition"
                    onclick="closeModal('batchDetailsModal')">
                <i class="w-4 h-4" data-lucide="x"></i>
            </button>
        </div>
        <div id="batchDetailsContent"></div>
    </div>
</div>

<!-- Batch summary modal -->
<div class="fixed inset-0 hidden items-center justify-center z-50 bg-black/60" id="batchSummaryModal">
    <div class="relative bg-white w-11/12 max-w-4xl shadow-xl z-10 overflow-y-auto max-h-[90vh]">
        <div class="flex justify-between items-center px-5 py-3 border-b border-gray-200">
            <h3 class="font-semibold text-gray-900" id="batchSummaryTitle" style="font-size:1rem;">Résumé du batch</h3>
            <button class="p-1.5 rounded hover:bg-gray-100 text-gray-500 transition"
                    onclick="closeModal('batchSummaryModal')">
                <i class="w-4 h-4" data-lucide="x"></i>
            </button>
        </div>
        <div class="p-5 text-gray-700" id="batchSummaryContent" style="font-size:.85rem;"></div>
    </div>
</div>

<div id="snackbar-container"></div>
<script src="/javascript/shared.js"></script>
{#insert script}{/insert}
<script>
    document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('mobile-overlay').classList.remove('hidden');
    });
    document.getElementById('mobile-overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('mobile-overlay').classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('sidebar')?.classList.add('-translate-x-full');
            document.getElementById('mobile-overlay')?.classList.add('hidden');
            document.getElementById('user-dropdown').style.display = 'none';
        }
    });
    document.addEventListener('click', e => {
        const w = document.getElementById('user-menu-wrapper');
        const dd = document.getElementById('user-dropdown');
        if (w && !w.contains(e.target) && dd) dd.style.display = 'none';
    });
    function toggleUserDropdown() {
        const dd = document.getElementById('user-dropdown');
        dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
    }
    (function() {
        // Auth.getUsername() returns 'Invité' as default — we want the actual name
        const authUser = (typeof Auth !== 'undefined') ? Auth.getUsername() : null;
        const storedUser = sessionStorage.getItem('username');
        const username = (authUser && authUser !== 'Invité' ? authUser : null) || storedUser || '—';
        const role     = sessionStorage.getItem('role')    || '—';
        const country  = sessionStorage.getItem('country') || '';
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
        set('header-user-initials', username.slice(0,2).toUpperCase());
        set('header-username', username);
        set('header-role', role);
        set('dropdown-username', username);
        set('dropdown-role', role);
        const dc = document.getElementById('dropdown-country');
        if (dc && country && typeof getCountryFlag !== 'undefined') {
            dc.innerHTML = getCountryFlag(country) + ' ' + country;
        }
    })();
    lucide.createIcons();
</script>
</body>
</html>
