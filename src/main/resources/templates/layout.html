<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{#insert title}FLUX Orange Bank{/insert}</title>
    <link href="/css/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@300;400&display=swap"
          rel="stylesheet">
    <script src="/javascript/vendor/lucide.min.js"></script>
    <link href="/images/favicon.ico" rel="shortcut icon"/>
    <style>
        /* ════════════════════════════════════════════════════
           FLUX design system — dark chrome / white surfaces
           ════════════════════════════════════════════════════ */
        :root{
            --ink:#000000; --ink-2:#1a1a1a; --ink-3:#4b5563;
            --chrome:#0a0a0a; --chrome-line:#1f1f1f; --chrome-text:#9aa3af;
            --canvas:#eceef1; --surface:#ffffff;
            --line:#c8cdd5; --line-soft:#e3e6ea;
            --orange:#e86e00; --orange-deep:#c45d00;
        }
        html { font-size: 0.92rem; }
        body { font-family: 'Inter', sans-serif; font-weight: 300; color: var(--ink-2); }
        .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
        .tnum { font-variant-numeric: tabular-nums; }

        /* ── Global re-skin of Tailwind utilities (applies to every page) ── */
        .rounded, .rounded-md, .rounded-lg, .rounded-xl, .rounded-sm { border-radius: 0 !important; }
        .bg-gray-100 { background-color: var(--canvas) !important; }
        .bg-gray-50  { background-color: #f4f6f9 !important; }
        .border-gray-200 { border-color: var(--line) !important; }
        .border-gray-300 { border-color: #b0b7c3 !important; }
        .divide-gray-200 > * + * { border-color: var(--line-soft) !important; }
        .text-gray-900 { color: var(--ink) !important; }
        .text-gray-700, .text-gray-800 { color: var(--ink-2) !important; }
        .text-gray-600, .text-gray-500 { color: var(--ink-3) !important; }
        .font-bold     { font-weight: 600 !important; }
        .font-semibold { font-weight: 500 !important; }
        .font-medium   { font-weight: 400 !important; }
        .shadow-sm, .shadow-xs { box-shadow: none !important; }
        .shadow-xl { box-shadow: 0 24px 48px rgba(0,0,0,.35) !important; }
        h1, h2, h3 { letter-spacing: -.01em; }
        /* Decorative pattern backgrounds removed — clean surfaces only */
        div[style*="pattern-2k"] { display: none !important; }

        /* ── Snackbar ── */
        #snackbar-container {
            position: fixed; bottom: 1.5rem; left: 1.5rem;
            display: flex; flex-direction: column-reverse; gap: 0.5rem;
            z-index: 9999; pointer-events: none;
        }
        .snackbar-item {
            pointer-events: all; min-width: 20rem;
            max-width: min(34rem, calc(100vw - 3rem));
            background: var(--chrome); color: rgba(255,255,255,0.9);
            border: 1px solid var(--chrome-line);
            box-shadow: 0 8px 24px rgba(0,0,0,.4);
            display: flex; align-items: center; gap: 0;
            font-size: .85rem; font-weight: 300; line-height: 1.25rem;
            overflow: hidden; opacity: 0; transform: translateY(8px);
            transition: opacity .2s cubic-bezier(0,0,.2,1), transform .2s cubic-bezier(0,0,.2,1);
        }
        .snackbar-item.snackbar-visible { opacity: 1; transform: translateY(0); }
        .snackbar-item.snackbar-hiding  { opacity: 0; transform: translateY(8px); }
        .snackbar-msg { flex: 1; padding: .875rem 1rem; word-break: break-word; }
        .snackbar-action {
            flex-shrink: 0; padding: .875rem 1rem .875rem 0;
            font-size: .78rem; font-weight: 500; letter-spacing: .08em;
            text-transform: uppercase; cursor: pointer; border: none;
            background: none; color: var(--orange); line-height: 1;
            white-space: nowrap; transition: color .15s;
        }
        .snackbar-action:hover { color: #ffb07a; }
        .snackbar-progress {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: rgba(255,255,255,0.25);
            animation: snackbar-shrink linear forwards;
        }
        @keyframes snackbar-shrink { from { width: 100%; } to { width: 0%; } }

        /* ── Stats cards (shared) ── */
        .stats-card {
            background: var(--surface); padding: 1.15rem 1.35rem;
            border: 1px solid var(--line); border-top: 3px solid var(--ink);
            transition: border-color .2s;
        }
        .stats-card:hover { border-color: var(--ink); }
        .stats-icon { width: 2rem; height: 2rem; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: var(--ink-3); background: #f4f6f9; }
        .stats-label { font-size: 0.62rem; font-weight: 500; color: var(--ink-3); text-transform: uppercase; letter-spacing: 0.16em; margin-bottom: 0.35rem; }
        .stats-value { font-size: 2rem; font-weight: 300; color: var(--ink); line-height: 1; letter-spacing: -.02em; font-variant-numeric: tabular-nums; }
        .card-green  { border-top-color: #0f9d58; }
        .card-orange { border-top-color: var(--orange); }
        .card-red    { border-top-color: #dc2626; }
        .card-blue   { border-top-color: #2563eb; }

        /* ── Panels (shared) ── */
        .panel { background: var(--surface); border: 1px solid var(--line); }
        .panel-head {
            padding: .85rem 1.35rem; border-bottom: 1px solid var(--line-soft);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: .75rem;
        }
        .panel-head h3 {
            font-size: .78rem; font-weight: 500; letter-spacing: .12em;
            text-transform: uppercase; color: var(--ink);
            display: flex; align-items: center; gap: .55rem;
        }
        .panel-head h3 i, .panel-head h3 svg { width: 15px; height: 15px; color: var(--orange); }
        .panel-body { padding: 1.35rem; }

        /* ── Dark chrome nav (sidebars) ── */
        .nav-section {
            font-size: .6rem; letter-spacing: .18em; text-transform: uppercase;
            color: #555e6d; padding: .4rem .65rem; margin-top: .6rem;
        }
        .nav-item {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.55rem 0.65rem; font-size: 0.86rem; font-weight: 300;
            transition: color .15s, background .15s; cursor: pointer;
            text-decoration: none; color: var(--chrome-text);
            border-left: 2px solid transparent;
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,.04); }
        .nav-item-active {
            color: #fff; border-left-color: var(--orange);
            background: rgba(232,110,0,.10); font-weight: 400;
        }

        /* ── Form inputs ── */
        .form-input, .form-select {
            width: 100%; padding: 0.45rem 0.7rem;
            border: 1.5px solid var(--line); border-radius: 0;
            font-size: 0.88rem; font-weight: 300; background: var(--surface);
            color: var(--ink); outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(232,110,0,0.15);
        }

        /* ── Page header ── */
        .page-header {
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: flex-start; gap: 0.75rem;
            padding-bottom: 1.1rem; margin-bottom: 1.5rem;
            border-bottom: 2px solid var(--ink);
        }
        @media (min-width: 640px) { .page-header { flex-direction: row; align-items: flex-end; } }
        .page-title    { font-size: 1.45rem; font-weight: 500; color: var(--ink); letter-spacing: -.015em; }
        .page-subtitle { font-size: 0.8rem; color: var(--ink-3); margin-top: 0.2rem; font-weight: 300; }

        /* ── Buttons ── */
        .btn-flux {
            display: inline-flex; align-items: center; gap: .45rem;
            font-family: inherit; font-size: .8rem; font-weight: 400;
            cursor: pointer; padding: .5rem .9rem;
            border: 1.5px solid var(--ink); background: var(--surface);
            color: var(--ink); transition: all .15s;
        }
        .btn-flux:hover { background: var(--ink); color: #fff; }
        .btn-flux-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
        .btn-flux-primary:hover { background: var(--orange-deep); border-color: var(--orange-deep); color: #fff; }

        /* ── Terminal log panel ── */
        .terminal {
            background: var(--chrome); color: #c9d1d9;
            font-family: 'JetBrains Mono', ui-monospace, monospace;
            font-size: .74rem; font-weight: 300; line-height: 1.85;
        }
        .terminal .lvl-info  { color: #58a6ff; }
        .terminal .lvl-warn  { color: #d29922; }
        .terminal .lvl-error { color: #f85149; }
        .terminal .log-ts    { color: #555e6d; }

        /* ── User dropdown ── */
        #user-dropdown {
            display: none; position: absolute; right: 0; top: calc(100% + 6px);
            width: 210px; background: var(--surface); border: 1px solid var(--line);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
            z-index: 100; overflow: hidden;
        }
        #user-dropdown.open { display: block; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition: none !important; animation: none !important; }
        }
    </style>
    {#insert head}{/insert}
</head>

<body class="bg-gray-100 antialiased min-h-screen flex">
<div class="fixed inset-0 z-40 bg-black/50 lg:hidden hidden" id="mobile-overlay"></div>

{#insert aside}{/insert}

<div class="flex-1 flex flex-col overflow-hidden lg:ml-64">

    <!-- Topbar — unified dark chrome -->
    <header class="flex-shrink-0 z-30" style="background:var(--chrome);border-bottom:1px solid var(--chrome-line);">
        <div class="px-5 py-2.5 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <button aria-label="Menu"
                        class="lg:hidden p-1.5 text-gray-400 hover:text-white hover:bg-white/10 transition"
                        id="sidebar-toggle">
                    <i class="w-4 h-4" data-lucide="menu"></i>
                </button>
                <span style="color:var(--chrome-text);font-size:.8rem;font-weight:300;">
                    <b style="color:#fff;font-weight:400;">FLUX</b>
                    <span style="margin:0 .4rem;color:#555e6d;">/</span>Orange Bank
                </span>
            </div>

            <!-- Operating window status badge — visible to all roles -->
            <div id="op-window-badge" style="display:none;align-items:center;gap:6px;
                 padding:3px 10px 3px 7px;border:1px solid transparent;font-size:.72rem;
                 font-weight:400;letter-spacing:.04em;transition:all .3s;">
                <span id="op-window-dot" style="width:6px;height:6px;border-radius:50%;
                      flex-shrink:0;display:inline-block;"></span>
                <span id="op-window-label"></span>
            </div>

            <!-- User dropdown -->
            <div class="relative" id="user-menu-wrapper">
                <button class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-white/10 transition"
                        onclick="toggleUserDropdown()">
                    <div class="w-6 h-6 rounded-full bg-orange-500 flex items-center justify-center flex-shrink-0">
                        <span class="text-white font-semibold" id="header-user-initials"
                              style="font-size:.6rem;">?</span>
                    </div>
                    <div class="hidden sm:block text-left leading-tight">
                        <p class="text-white" id="header-username" style="font-weight:400;font-size:.8rem;">—</p>
                        <p class="uppercase" id="header-role"
                           style="font-size:.62rem;letter-spacing:.12em;color:var(--chrome-text);">—</p>
                    </div>
                    <i class="w-3 h-3" data-lucide="chevron-down" style="color:#555e6d;"></i>
                </button>

                <div id="user-dropdown">
                    <div class="px-3 py-2.5 bg-gray-50 border-b border-gray-100">
                        <p class="font-bold text-gray-800" id="dropdown-username">—</p>
                        <p class="text-gray-500 mt-0.5" id="dropdown-role"
                           style="font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;">—</p>
                        <div class="text-gray-400 mt-1 flex items-center gap-1" id="dropdown-country"
                             style="font-size:.68rem;"></div>
                    </div>
                    <div class="py-1">
                        <a class="flex items-center gap-2 px-3 py-2 text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition"
                           href="/change-password"
                           style="font-size:.8rem;">
                            <i class="w-3.5 h-3.5 text-gray-400" data-lucide="key-round"></i>
                            Changer le mot de passe
                        </a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <button class="w-full flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 transition"
                                onclick="logoutUser()"
                                style="font-size:.8rem;">
                            <i class="w-3.5 h-3.5" data-lucide="log-out"></i>
                            Déconnexion
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
        {#insert default}{/insert}
    </main>
</div>

<!-- Delete modal -->
<div class="fixed inset-0 z-50 hidden bg-black/60 flex items-center justify-center" id="deleteConfirmationModal">
    <div class="bg-white shadow-xl p-5 max-w-md mx-4 w-full" style="border-top:3px solid #dc2626;">
        <h3 class="font-bold text-gray-900 mb-2" style="font-size:1rem;">Confirmer la suppression</h3>
        <p class="text-gray-600 mb-5" style="font-size:.85rem;">Voulez-vous vraiment supprimer ce batch ? Cette action
            est irréversible.</p>
        <div class="flex justify-end gap-2">
            <button class="px-3 py-1.5 text-gray-700 bg-gray-100 hover:bg-gray-200 transition"
                    onclick="cancelDelete()" style="font-size:.85rem;">Annuler
            </button>
            <button class="px-3 py-1.5 text-white bg-red-600 hover:bg-red-700 transition"
                    onclick="confirmDelete()" style="font-size:.85rem;">Supprimer
            </button>
        </div>
    </div>
</div>

<!-- Batch details modal -->
<div class="fixed inset-0 hidden items-center justify-center z-50" id="batchDetailsModal"
     onclick="if(event.target===this)closeModal('batchDetailsModal')">
    <div class="absolute inset-0 bg-black/60"></div>
    <div class="relative bg-white w-11/12 max-w-6xl shadow-xl p-5 z-10 overflow-y-auto max-h-[90vh]"
         style="border-top:3px solid var(--orange);">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-semibold text-gray-900" style="font-size:1rem;">Détails du batch</h2>
            <button class="p-1.5 hover:bg-gray-100 text-gray-500 transition"
                    onclick="closeModal('batchDetailsModal')">
                <i class="w-4 h-4" data-lucide="x"></i>
            </button>
        </div>
        <div id="batchDetailsContent"></div>
    </div>
</div>

<!-- Batch summary modal -->
<div class="fixed inset-0 hidden items-center justify-center z-50 bg-black/60" id="batchSummaryModal">
    <div class="relative bg-white w-11/12 max-w-4xl shadow-xl z-10 overflow-y-auto max-h-[90vh]"
         style="border-top:3px solid var(--orange);">
        <div class="flex justify-between items-center px-5 py-3 border-b border-gray-200">
            <h3 class="font-semibold text-gray-900" id="batchSummaryTitle" style="font-size:1rem;">Résumé du batch</h3>
            <button class="p-1.5 hover:bg-gray-100 text-gray-500 transition"
                    onclick="closeModal('batchSummaryModal')">
                <i class="w-4 h-4" data-lucide="x"></i>
            </button>
        </div>
        <div class="p-5 text-gray-700" id="batchSummaryContent" style="font-size:.85rem;"></div>
    </div>
</div>

<div id="snackbar-container"></div>
<script src="/javascript/shared.js"></script>
{#insert script}{/insert}
<script>
    // Start the operating window badge on every page
    if (typeof pollWindowStatus === 'function') pollWindowStatus();

    document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('mobile-overlay').classList.remove('hidden');
    });
    document.getElementById('mobile-overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('mobile-overlay').classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('sidebar')?.classList.add('-translate-x-full');
            document.getElementById('mobile-overlay')?.classList.add('hidden');
            document.getElementById('user-dropdown')?.classList.remove('open');
        }
    });
    document.addEventListener('click', e => {
        const w = document.getElementById('user-menu-wrapper');
        if (w && !w.contains(e.target)) document.getElementById('user-dropdown')?.classList.remove('open');
    });
    function toggleUserDropdown() {
        document.getElementById('user-dropdown').classList.toggle('open');
    }
    (function() {
        // Auth.getUsername() returns 'Invité' as default — we want the actual name
        const authUser = (typeof Auth !== 'undefined') ? Auth.getUsername() : null;
        const storedUser = sessionStorage.getItem('username');
        const username = (authUser && authUser !== 'Invité' ? authUser : null) || storedUser || '—';
        const role     = sessionStorage.getItem('role')    || '—';
        const country  = sessionStorage.getItem('country') || '';
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
        set('header-user-initials', username.slice(0,2).toUpperCase());
        set('header-username', username);
        set('header-role', role);
        set('dropdown-username', username);
        set('dropdown-role', role);
        const dc = document.getElementById('dropdown-country');
        if (dc && country && typeof getCountryFlag !== 'undefined') {
            dc.innerHTML = getCountryFlag(country) + ' ' + country;
        }
    })();
    lucide.createIcons();
</script>
</body>
</html>
