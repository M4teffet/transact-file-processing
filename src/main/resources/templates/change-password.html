{#include layout}
{#title}Batches — Orange Bank{/title}
{#aside}{#include sidebar-ops/}{/aside}
{#default}
<div class="max-w-7xl mx-auto space-y-4">
    <div class="page-header">
        <h1 class="page-title">Batches uploadés</h1>
        <p class="page-subtitle">Fichiers en attente de validation</p>
    </div>
    <div class="grid grid-cols-2 gap-3">
        <div class="stats-card card-orange">
            <div class="flex items-center justify-between">
                <div><p class="stats-label">Total chargés</p>
                    <p class="stats-value" id="uploadedCount" style="color:#fb923c;">0</p></div>
                <div class="stats-icon" style="background:rgba(255,121,0,.1);"><i class="w-4 h-4" data-lucide="upload-cloud"
                                                                                  style="color:#ff7900;"></i></div>
            </div>
        </div>
        <div class="stats-card card-green">
            <div class="flex items-center justify-between">
                <div><p class="stats-label">Total validés</p>
                    <p class="stats-value" id="validatedCount" style="color:#4ade80;">0</p></div>
                <div class="stats-icon" style="background:rgba(34,197,94,.1);"><i class="w-4 h-4" data-lucide="check-circle-2"
                                                                                  style="color:#4ade80;"></i>
                </div>
            </div>
        </div>
    </div>
    <div class="dd-card">
        <div class="dd-card-head"><i class="w-3.5 h-3.5 head-icon" data-lucide="layers"></i> Liste des batches</div>
        <div class="dd-card-body" id="uploadedBatchesContainer"></div>
    </div>
</div>
{/default}
{#script}
<script src="/javascript/batches.js"></script>
<script>lucide.createIcons();</script>
{/script}
{/include}
