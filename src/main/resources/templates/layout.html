<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>{#insert title}FLUX Orange Bank{/insert}</title>
    <link href="/css/tailwind.css" rel="stylesheet">
    <script src="/javascript/vendor/lucide.min.js"></script>
    <link href="/images/favicon.ico" rel="shortcut icon"/>
    <style>
        /* ════════════════════════════════════════════════════
           FLUX — Orange Design System (Boosted) token set
           Brand orange #FF7900 · Helvetica Neue · flat, rectangular
           ════════════════════════════════════════════════════ */
        :root{
            --orange: #FF7900;
            --orange-deep: #C65B00;
            --ink: #1B1B1B;
            --ink-2: #595959;
            --ink-3: #767676;
            --ink-4: #B4B4B4;
            --chrome: #0a0a0a;
            --chrome-line: #1f1f1f;
            --chrome-text: #9aa3af;
            --chrome-section: #555e6d;
            --canvas: #F6F6F6;
            --surface: #ffffff;
            --line: #E8E8E8;
            --line-soft: #F0F0F0;
            /* semantic status colors: bg / text / border */
            --status-pending-bg: #F6F6F6;
            --status-pending-text: #595959;
            --status-pending-border: #E0E0E0;
            --status-validated-bg: #EAF1FE;
            --status-validated-text: #0B5ED7;
            --status-validated-border: #C3D9FB;
            --status-processing-bg: #FFF1E6;
            --status-processing-text: #C65B00;
            --status-processing-border: #FFD9B8;
            --status-success-bg: #E9F7EF;
            --status-success-text: #127A3E;
            --status-success-border: #BEEAD1;
            --status-warning-bg: #FFF6E0;
            --status-warning-text: #8A5A00;
            --status-warning-border: #F3DFA0;
            --status-error-bg: #FDEDEB;
            --status-error-text: #B42318;
            --status-error-border: #F5C4BB;
        }
        html { font-size: 0.92rem; }

        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 400;
            color: var(--ink-2);
        }

        .mono {
            font-family: ui-monospace, 'JetBrains Mono', 'Cascadia Code', monospace;
        }
        .tnum { font-variant-numeric: tabular-nums; }

        /* ── Global re-skin of Tailwind utilities (applies to every page) ── */
        .rounded, .rounded-md, .rounded-lg, .rounded-xl, .rounded-sm { border-radius: 0 !important; }
        .bg-gray-100 { background-color: var(--canvas) !important; }

        .bg-gray-50 {
            background-color: var(--canvas) !important;
        }
        .border-gray-200 { border-color: var(--line) !important; }

        .border-gray-300 {
            border-color: var(--ink-4) !important;
        }
        .divide-gray-200 > * + * { border-color: var(--line-soft) !important; }
        .text-gray-900 { color: var(--ink) !important; }
        .text-gray-700, .text-gray-800 { color: var(--ink-2) !important; }
        .text-gray-600, .text-gray-500 { color: var(--ink-3) !important; }

        .font-bold {
            font-weight: 700 !important;
        }

        .font-semibold {
            font-weight: 700 !important;
        }
        .font-medium   { font-weight: 400 !important; }

        .shadow-sm, .shadow-xs, .shadow, .shadow-md, .shadow-lg {
            box-shadow: none !important;
        }
        .shadow-xl { box-shadow: 0 24px 48px rgba(0,0,0,.35) !important; }

        h1, h2, h3 {
            font-weight: 700;
            letter-spacing: -.01em;
        }
        /* Decorative pattern backgrounds removed — clean surfaces only */
        div[style*="pattern-2k"] { display: none !important; }

        /* ── Tailwind's default orange-* scale (#ea580c etc.) doesn't match the
           Orange brand hue (#FF7900) — remap the shades used across the app. ── */
        .bg-orange-500, .bg-orange-600 {
            background-color: var(--orange) !important;
        }

        .hover\:bg-orange-700:hover, .hover\:bg-orange-600:hover {
            background-color: var(--orange-deep) !important;
        }

        .hover\:bg-orange-50:hover {
            background-color: var(--status-processing-bg) !important;
        }

        .bg-orange-50 {
            background-color: var(--status-processing-bg) !important;
        }

        .text-orange-500, .text-orange-600, .text-orange-700, .text-orange-800 {
            color: var(--orange) !important;
        }

        .hover\:text-orange-600:hover, .hover\:text-orange-700:hover {
            color: var(--orange-deep) !important;
        }

        .border-orange-200, .border-orange-400, .border-orange-500 {
            border-color: var(--orange) !important;
        }

        .hover\:border-orange-500:hover {
            border-color: var(--orange) !important;
        }

        .focus\:ring-orange-500:focus {
            --tw-ring-color: rgba(255, 121, 0, .35) !important;
        }

        .focus\:border-orange-500:focus {
            border-color: var(--orange) !important;
        }

        /* ── Snackbar ── */
        #snackbar-container {
            position: fixed; bottom: 1.5rem; left: 1.5rem;
            display: flex; flex-direction: column-reverse; gap: 0.5rem;
            z-index: 9999; pointer-events: none;
        }
        .snackbar-item {
            pointer-events: all; min-width: 20rem;
            max-width: min(34rem, calc(100vw - 3rem));
            background: var(--chrome); color: rgba(255,255,255,0.9);
            border: 1px solid var(--chrome-line);
            box-shadow: 0 8px 24px rgba(0,0,0,.4);
            display: flex; align-items: center; gap: 0;
            font-size: .85rem; font-weight: 300; line-height: 1.25rem;
            overflow: hidden; opacity: 0; transform: translateY(8px);
            transition: opacity .2s cubic-bezier(0,0,.2,1), transform .2s cubic-bezier(0,0,.2,1);
        }
        .snackbar-item.snackbar-visible { opacity: 1; transform: translateY(0); }
        .snackbar-item.snackbar-hiding  { opacity: 0; transform: translateY(8px); }
        .snackbar-msg { flex: 1; padding: .875rem 1rem; word-break: break-word; }
        .snackbar-action {
            flex-shrink: 0; padding: .875rem 1rem .875rem 0;
            font-size: .78rem; font-weight: 500; letter-spacing: .08em;
            text-transform: uppercase; cursor: pointer; border: none;
            background: none; color: var(--orange); line-height: 1;
            white-space: nowrap; transition: color .15s;
        }
        .snackbar-action:hover { color: #ffb07a; }
        .snackbar-progress {
            position: absolute; bottom: 0; left: 0; height: 2px;
            background: rgba(255,255,255,0.25);
            animation: snackbar-shrink linear forwards;
        }
        @keyframes snackbar-shrink { from { width: 100%; } to { width: 0%; } }

        /* ── Stats cards (shared) ── */
        .stats-card {
            background: var(--surface); padding: 1.15rem 1.35rem;
            border: 1px solid var(--line); border-top: 3px solid var(--ink);
            transition: border-color .2s;
        }
        .stats-card:hover { border-color: var(--ink); }

        .stats-icon {
            width: 2.1rem;
            height: 2.1rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            color: var(--ink-3);
            background: var(--canvas);
        }

        .stats-label {
            font-size: 0.65rem;
            font-weight: 700;
            color: var(--ink-3);
            text-transform: uppercase;
            letter-spacing: 0.08em;
            margin-bottom: 0.4rem;
        }

        .stats-value {
            font-size: 1.9rem;
            font-weight: 700;
            color: var(--ink);
            line-height: 1;
            letter-spacing: -.01em;
            font-variant-numeric: tabular-nums;
        }

        .card-green {
            border-top-color: #127A3E;
        }
        .card-orange { border-top-color: var(--orange); }

        .card-red {
            border-top-color: #B42318;
        }

        .card-blue {
            border-top-color: #0B5ED7;
        }

        /* ── Panels (shared) ── */
        .panel { background: var(--surface); border: 1px solid var(--line); }
        .panel-head {
            padding: .85rem 1.35rem; border-bottom: 1px solid var(--line-soft);
            display: flex; justify-content: space-between; align-items: center;
            flex-wrap: wrap; gap: .75rem;
        }
        .panel-head h3 {
            font-size: .72rem;
            font-weight: 700;
            letter-spacing: .08em;
            text-transform: uppercase; color: var(--ink);
            display: flex; align-items: center; gap: .55rem;
        }
        .panel-head h3 i, .panel-head h3 svg { width: 15px; height: 15px; color: var(--orange); }
        .panel-body { padding: 1.35rem; }

        /* ── Dark chrome nav (sidebars) ── */
        .nav-section {
            font-size: .6rem;
            letter-spacing: .1em;
            text-transform: uppercase;
            font-weight: 700;
            color: var(--chrome-section);
            padding: .4rem .65rem;
            margin-top: .6rem;
        }
        .nav-item {
            display: flex; align-items: center; gap: 0.65rem;
            padding: 0.6rem 0.65rem;
            font-size: 0.86rem;
            font-weight: 400;
            transition: color .15s, background .15s; cursor: pointer;
            text-decoration: none; color: var(--chrome-text);
            border-left: 3px solid transparent;
        }
        .nav-item:hover { color: #fff; background: rgba(255,255,255,.04); }
        .nav-item-active {
            color: #fff; border-left-color: var(--orange);
            background: rgba(255, 121, 0, .10);
            font-weight: 700;
        }

        /* ── Form inputs ── */
        .form-input, .form-select {
            width: 100%;
            padding: 0.55rem 0.7rem;
            border: 1.5px solid var(--ink-4);
            border-radius: 0;
            font-size: 0.88rem;
            font-weight: 400;
            background: var(--surface);
            color: var(--ink); outline: none;
            transition: border-color 0.15s, box-shadow 0.15s;
        }
        .form-input:focus, .form-select:focus {
            border-color: var(--orange);
            box-shadow: 0 0 0 3px rgba(255, 121, 0, 0.15);
        }

        /* ── Page header ── */
        .page-header {
            display: flex; flex-direction: column; justify-content: space-between;
            align-items: flex-start; gap: 0.75rem;
            padding-bottom: 1.1rem; margin-bottom: 1.5rem;
            border-bottom: 1px solid var(--line);
        }
        @media (min-width: 640px) { .page-header { flex-direction: row; align-items: flex-end; } }

        .page-title {
            font-size: 1.45rem;
            font-weight: 700;
            color: var(--ink);
            letter-spacing: -.01em;
        }

        .page-subtitle {
            font-size: 0.8rem;
            color: var(--ink-3);
            margin-top: 0.2rem;
            font-weight: 400;
        }

        /* ── Buttons ── */
        .btn-flux {
            display: inline-flex; align-items: center; gap: .45rem;
            font-family: inherit;
            font-size: .8rem;
            font-weight: 700;
            cursor: pointer;
            padding: .6rem .95rem;
            border: 1.5px solid var(--ink); background: var(--surface);
            color: var(--ink); transition: all .15s;
        }
        .btn-flux:hover { background: var(--ink); color: #fff; }
        .btn-flux-primary { background: var(--orange); border-color: var(--orange); color: #fff; }
        .btn-flux-primary:hover { background: var(--orange-deep); border-color: var(--orange-deep); color: #fff; }

        /* ── Terminal log panel ── */
        .terminal {
            background: var(--ink);
            color: #E8E8E8;
            font-family: ui-monospace, 'JetBrains Mono', monospace;
            font-size: .74rem;
            font-weight: 400;
            line-height: 1.85;
        }
        .terminal .lvl-info  { color: #58a6ff; }
        .terminal .lvl-warn  { color: #d29922; }
        .terminal .lvl-error { color: #f85149; }
        .terminal .log-ts    { color: #555e6d; }

        /* ── User dropdown ── */
        #user-dropdown {
            display: none; position: absolute; right: 0; top: calc(100% + 6px);
            width: 210px; background: var(--surface); border: 1px solid var(--line);
            box-shadow: 0 12px 32px rgba(0,0,0,0.25);
            z-index: 100; overflow: hidden;
        }
        #user-dropdown.open { display: block; }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { transition: none !important; animation: none !important; }
        }
    </style>
    {#insert head}{/insert}
</head>

<body class="bg-gray-100 antialiased min-h-screen flex">
<div class="fixed inset-0 z-40 bg-black/50 lg:hidden hidden" id="mobile-overlay"></div>

{#insert aside}{/insert}

<div class="flex-1 flex flex-col overflow-hidden lg:ml-64">

    <!-- Topbar — unified dark chrome -->
    <header class="flex-shrink-0 z-30" style="background:var(--chrome);border-bottom:1px solid var(--chrome-line);">
        <div class="px-5 py-2.5 flex justify-between items-center">

            <div class="flex items-center gap-3">
                <button aria-label="Menu"
                        class="lg:hidden p-1.5 text-gray-400 hover:text-white hover:bg-white/10 transition"
                        id="sidebar-toggle">
                    <i class="w-4 h-4" data-lucide="menu"></i>
                </button>
                <span style="color:var(--chrome-text);font-size:.8rem;font-weight:300;">
                    <b style="color:#fff;font-weight:400;">FLUX</b>
                    <span style="margin:0 .4rem;color:#555e6d;">/</span>Orange Bank
                </span>
            </div>

            <!-- User dropdown -->
            <div class="relative" id="user-menu-wrapper">
                <button class="flex items-center gap-2 px-2.5 py-1.5 hover:bg-white/10 transition"
                        onclick="toggleUserDropdown()">
                    <div class="w-6 h-6 rounded-full bg-orange-500 flex items-center justify-center flex-shrink-0">
                        <span class="text-white font-semibold" id="header-user-initials"
                              style="font-size:.6rem;">?</span>
                    </div>
                    <div class="hidden sm:block text-left leading-tight">
                        <p class="text-white" id="header-username" style="font-weight:400;font-size:.8rem;">—</p>
                        <p class="uppercase" id="header-role"
                           style="font-size:.62rem;letter-spacing:.12em;color:var(--chrome-text);">—</p>
                    </div>
                    <i class="w-3 h-3" data-lucide="chevron-down" style="color:#555e6d;"></i>
                </button>

                <div id="user-dropdown">
                    <div class="px-3 py-2.5 bg-gray-50 border-b border-gray-100">
                        <p class="font-bold text-gray-800" id="dropdown-username">—</p>
                        <p class="text-gray-500 mt-0.5" id="dropdown-role"
                           style="font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;">—</p>
                        <div class="text-gray-400 mt-1 flex items-center gap-1" id="dropdown-country"
                             style="font-size:.68rem;"></div>
                    </div>
                    <div class="py-1">
                        <a class="flex items-center gap-2 px-3 py-2 text-gray-700 hover:bg-orange-50 hover:text-orange-700 transition"
                           href="/change-password"
                           style="font-size:.8rem;">
                            <i class="w-3.5 h-3.5 text-gray-400" data-lucide="key-round"></i>
                            Changer le mot de passe
                        </a>
                        <div class="border-t border-gray-100 my-1"></div>
                        <button class="w-full flex items-center gap-2 px-3 py-2 text-red-600 hover:bg-red-50 transition"
                                onclick="logoutUser()"
                                style="font-size:.8rem;">
                            <i class="w-3.5 h-3.5" data-lucide="log-out"></i>
                            Déconnexion
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </header>

    <main class="flex-1 overflow-x-hidden overflow-y-auto p-6">
        {#insert default}{/insert}
    </main>
</div>

<!-- Delete modal -->
<div class="fixed inset-0 z-50 hidden flex items-center justify-center bg-black/60"
     id="deleteConfirmationModal"
     onclick="if(event.target===this)cancelDelete()">
    <div class="bg-white w-full mx-4"
         style="max-width:420px;border-top:4px solid var(--status-error-text);box-shadow:0 24px 60px rgba(0,0,0,.3);">
        <div class="px-5 py-3.5 flex items-center justify-between" style="border-bottom:1px solid var(--line-soft);">
            <div class="flex items-center gap-2">
                <i data-lucide="trash-2" class="w-4 h-4" style="color:var(--status-error-text);"></i>
                <h3 style="font-size:.92rem;font-weight:700;color:var(--ink);">Supprimer le lot</h3>
            </div>
            <button style="padding:4px;color:var(--ink-3);" onclick="cancelDelete()" aria-label="Fermer">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="px-5 py-4">
            <p style="font-size:.8rem;color:var(--ink-2);line-height:1.5;">
                Ce lot sera définitivement supprimé. Cette action est irréversible.
            </p>
        </div>
        <div class="px-5 py-3 flex gap-2 justify-end" style="border-top:1px solid var(--line-soft);">
            <button class="btn-flux" onclick="cancelDelete()">Annuler
            </button>
            <button class="btn-flux"
                    style="background:var(--status-error-text);border-color:var(--status-error-text);color:#fff;"
                    onclick="confirmDelete()">
                <i data-lucide="trash-2" class="w-3.5 h-3.5"></i>Supprimer
            </button>
        </div>
    </div>
</div>

<!-- Batch details modal -->
<div class="fixed inset-0 hidden flex items-center justify-center z-50 bg-black/60" id="batchDetailsModal"
     onclick="if(event.target===this)closeModal('batchDetailsModal')">
    <div class="relative bg-white w-11/12 max-w-6xl shadow-xl z-10 overflow-y-auto max-h-[90vh]"
         style="border-top:3px solid var(--orange);">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <i data-lucide="file-text" class="w-4 h-4 text-orange-600"></i>
                <h2 class="text-sm font-semibold text-gray-900">Détails du lot</h2>
            </div>
            <button class="p-1 hover:bg-gray-100 text-gray-400 transition"
                    onclick="closeModal('batchDetailsModal')" aria-label="Fermer">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="p-5" id="batchDetailsContent"></div>
    </div>
</div>

<!-- Batch summary modal -->
<div class="fixed inset-0 hidden flex items-center justify-center z-50 bg-black/60" id="batchSummaryModal"
     onclick="if(event.target===this) closeSummaryModal()">
    <div class="relative bg-white w-11/12 max-w-4xl shadow-xl z-10 overflow-y-auto max-h-[90vh]"
         style="border-top:3px solid var(--orange);">
        <div class="flex items-center justify-between px-5 py-3.5 border-b border-gray-100">
            <div class="flex items-center gap-2">
                <i data-lucide="bar-chart-2" class="w-4 h-4 text-orange-600"></i>
                <h3 class="text-sm font-semibold text-gray-900" id="batchSummaryTitle">Résumé du lot</h3>
            </div>
            <button class="p-1 hover:bg-gray-100 text-gray-400 transition"
                    onclick="closeSummaryModal()" aria-label="Fermer">
                <i data-lucide="x" class="w-4 h-4"></i>
            </button>
        </div>
        <div class="p-5 text-gray-700" id="batchSummaryContent" style="font-size:.85rem;"></div>
    </div>
</div>

<div id="snackbar-container"></div>
<script src="/javascript/shared.js"></script>
{#insert script}{/insert}
<script>
    // Start the operating window badge on every page
    if (typeof pollWindowStatus === 'function') pollWindowStatus();

    document.getElementById('sidebar-toggle')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.toggle('-translate-x-full');
        document.getElementById('mobile-overlay').classList.remove('hidden');
    });
    document.getElementById('mobile-overlay')?.addEventListener('click', () => {
        document.getElementById('sidebar').classList.add('-translate-x-full');
        document.getElementById('mobile-overlay').classList.add('hidden');
    });
    document.addEventListener('keydown', e => {
        if (e.key === 'Escape') {
            document.getElementById('sidebar')?.classList.add('-translate-x-full');
            document.getElementById('mobile-overlay')?.classList.add('hidden');
            document.getElementById('user-dropdown')?.classList.remove('open');
        }
    });
    document.addEventListener('click', e => {
        const w = document.getElementById('user-menu-wrapper');
        if (w && !w.contains(e.target)) document.getElementById('user-dropdown')?.classList.remove('open');
    });
    function toggleUserDropdown() {
        document.getElementById('user-dropdown').classList.toggle('open');
    }
    (function() {
        // Auth.getUsername() returns 'Invité' as default — we want the actual name
        const authUser = (typeof Auth !== 'undefined') ? Auth.getUsername() : null;
        const storedUser = sessionStorage.getItem('username');
        const username = (authUser && authUser !== 'Invité' ? authUser : null) || storedUser || '—';
        const role     = sessionStorage.getItem('role')    || '—';
        const country  = sessionStorage.getItem('country') || '';
        const set = (id, v) => { const el = document.getElementById(id); if (el) el.textContent = v; };
        set('header-user-initials', username.slice(0,2).toUpperCase());
        set('header-username', username);
        set('header-role', role);
        set('dropdown-username', username);
        set('dropdown-role', role);
        const dc = document.getElementById('dropdown-country');
        if (dc && country && typeof getCountryFlag !== 'undefined') {
            dc.innerHTML = getCountryFlag(country) + ' ' + country;
        }
    })();
    lucide.createIcons();
</script>
</body>
</html>
