<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Connexion - Orange Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <script src="/javascript/vendor/lucide.min.js"></script>
</head>
<body>
<div class="auth-card" role="main">

    <div class="auth-header">
        <img alt="Orange Bank" class="auth-logo"
             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/f/fb/Logo_Orange_Bank.svg'"
             src="/images/Logo_Orange_Bank.svg">
        <h1 class="auth-title">Connexion sécurisée</h1>
        <p class="auth-subtitle">Accédez à votre tableau de bord</p>
    </div>

    <!-- Step 1: Credentials -->
    <div class="step active" id="step-credentials">
        <form id="credentialsForm">
            <div class="auth-group">
                <label class="auth-label" for="username">Nom d'utilisateur</label>
                <input autocomplete="username" autofocus class="auth-input"
                       id="username" placeholder="Nom d'utilisateur" required type="text">
            </div>
            <div class="auth-group">
                <label class="auth-label" for="password">Mot de passe</label>
                <input autocomplete="current-password" class="auth-input auth-input-pwd" id="password"
                       placeholder="Mot de passe" required type="password">
                <button aria-label="Afficher" class="eye-btn" data-target="password" type="button">
                    <i data-lucide="eye-off"></i>
                </button>
            </div>
            <button class="auth-btn" id="loginBtn" type="submit">
                <span id="loginBtnText">Se connecter</span>
            </button>
        </form>
        <div style="text-align:center;margin-top:1rem">
            <a class="auth-link" href="/forgot-password">Mot de passe oublié ?</a>
        </div>
        <div class="auth-error" id="credError" role="alert">
            <span id="credErrorMsg"></span>
        </div>
    </div>

    <!-- Step 2: OTP -->
    <div class="step" id="step-otp">
        <p class="auth-subtitle" id="otpHintMsg" style="margin-bottom:1rem">Un code vous a été envoyé par e-mail</p>
        <form id="otpForm">
            <div class="auth-group">
                <label class="auth-label" for="otpCode">Code de vérification</label>
                <input autocomplete="one-time-code" class="otp-input" id="otpCode"
                       inputmode="numeric" maxlength="6"
                       placeholder="● ● ● ● ● ●" required type="text">
            </div>
            <button class="auth-btn" id="otpBtn" type="submit">
                <span>Valider</span>
            </button>
            <button class="auth-btn auth-btn-ghost" id="resendBtn" type="button">
                <span>Renvoyer le code</span>
            </button>
        </form>
        <div class="auth-error" id="otpError" role="alert">
            <span id="otpErrorMsg"></span>
        </div>
        <div style="text-align:center;margin-top:1rem">
            <button class="auth-link" onclick="backToCredentials()" style="background:none;border:none;cursor:pointer"
                    type="button">← Retour
            </button>
        </div>
        <p id="otpTimer" style="text-align:center;margin-top:.5rem;font-size:.8rem;color:#6b7280"></p>
    </div>

    <div class="auth-footer">&copy; 2025 Orange Bank. Tous droits réservés.</div>
</div>

<script src="/javascript/login-script.js"></script>
<script>
    if (window.lucide) lucide.createIcons();
    document.querySelectorAll('.eye-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            var input = document.getElementById(btn.dataset.target);
            var icon = btn.querySelector('i');
            if (!input) return;
            if (input.type === 'password') {
                input.type = 'text';
                icon.setAttribute('data-lucide', 'eye');
            } else {
                input.type = 'password';
                icon.setAttribute('data-lucide', 'eye-off');
            }
            lucide.createIcons();
        });
    });
</script>
</body>
</html>
