################################################################################
# GLOBAL & PERFORMANCE CONFIG
################################################################################
quarkus.http.port=${PORT:8080}
# Limits upload size to prevent OOM attacks (10MB is safe for most bank files)
quarkus.http.limits.max-body-size=10M
com.transact.upload.max-lines=${MAX_UPLOAD_LINES:1000}
# Threading: Matches your 90s transaction timeout to prevent watchdog kills
quarkus.vertx.worker-pool-watchdog-timeout=95s
################################################################################
# MONGODB CONFIG (Hardened)
################################################################################
quarkus.mongodb.connection-string=${MONGO_URL:mongodb://localhost:27017}
quarkus.mongodb.database=transactdb
# Automatically adds /q/health/ready check for Mongo
quarkus.mongodb.health.enabled=true
################################################################################
# FUNDS TRANSFER API (REST CLIENT)
################################################################################
quarkus.rest-client."funds-transfer-api".url=${FUNDS_TRANSFER_API_URL:http://192.168.1.4:8085/omerchant/api/v1.0.0/order/payments}
# REQUIRED: Set FT_API_USER and FT_API_PASS as environment variables — no defaults for credentials
ft.api.user=${FT_API_USER}
ft.api.pass=${FT_API_PASS}

# Timeouts: Tighten these slightly for production if the API is reliable
quarkus.rest-client."funds-transfer-api".connect-timeout=30000
quarkus.rest-client."funds-transfer-api".read-timeout=90000
# REST Logging: Default to HEADERS only — never log full bodies in any environment (passwords/amounts)
# Override to 'request-response' locally only via env var if needed for debugging
quarkus.rest-client."funds-transfer-api".logging.scope=${REST_CLIENT_LOG_SCOPE:headers}
quarkus.rest-client."funds-transfer-api".logging.body-limit=4096
quarkus.log.category."io.quarkus.rest.client.reactive.logging".level=${REST_LOG_LEVEL:INFO}
################################################################################
# SECURITY - JWT & AUTH (Externalized Keys)
################################################################################
quarkus.security.enabled=true
# Allow local login without JWT
# Public API endpoints — no JWT required
quarkus.http.auth.permission.public-api.paths=/api/login,/api/logout,/api/status,/api/auth/forgot-password,/api/auth/reset-password,/api/auth/verify-otp,/api/auth/resend-otp,/api/auth/password-policy
quarkus.http.auth.permission.public-api.policy=permit
# JWT Verification
mp.jwt.verify.publickey.location=${JWT_PUBLIC_KEY_PATH:classpath:/jwt/rsaPublicKey.pem}
mp.jwt.verify.issuer=orange-bank-app
mp.jwt.verify.algorithm=RS256
mp.jwt.token.cookie=AuthToken
mp.jwt.token.header=Cookie
# JWT Signing (Only needed if this app issues tokens)
smallrye.jwt.sign.key.location=${JWT_PRIVATE_KEY_PATH:classpath:/jwt/pkcs8_privateKey.pem}
################################################################################
# CACHE & MONITORING
################################################################################
quarkus.cache.caffeine."applications".maximum-size=500
quarkus.cache.caffeine."applications".expire-after-write=30M
# Enable OpenAPI and Health but protect them in production
quarkus.smallrye-openapi.enable=true
quarkus.smallrye-health.ui.enable=true
################################################################################
# PRODUCTION OVERRIDES (%prod)
################################################################################
# In production, we hide sensitive data and optimize
%prod.quarkus.log.category."io.quarkus.rest.client.reactive.logging".level=DEBUG
%prod.rest-client-log-scope=none
%prod.quarkus.smallrye-openapi.enable=false
################################################################################
quarkus.cache.caffeine.user-country-cache.expire-after-write=1H
################################################################################
# PASSWORD POLICY
################################################################################
################################################################################
# LOGIN SECURITY
################################################################################
app.login.max-failed-attempts=5
# OTP code lifetime (seconds)
app.otp.expiry-seconds=300
# Password reset link lifetime (seconds)
app.reset.expiry-seconds=1800
################################################################################
# EMAIL — Orange Bank internal mail API
################################################################################
# POST multipart/form-data to this endpoint
app.mail.api-url=${MAIL_API_URL:https://appstest.oba/portail_app/Envoie_mail/api/send_mail_entite}
app.mail.app-name=${MAIL_APP_NAME:Batch Manager}
app.mail.default-entite=${MAIL_DEFAULT_ENTITE:CI}
# Base URL used in email links (change to production domain)
app.base-url=${APP_BASE_URL:http://localhost:8080}
################################################################################
# HTTP ROUTING — new auth pages
################################################################################
# Public HTML pages — no JWT required
quarkus.http.auth.permission.public-pages.paths=/login,/forgot-password,/reset-password,/change-password,/magic-login
quarkus.http.auth.permission.public-pages.policy=permit
################################################################################
# SECURITY ENHANCEMENTS
################################################################################
# Email domain whitelist (comma-separated). Users must have an email from one of these domains.
app.allowed-email-domains=${ALLOWED_EMAIL_DOMAINS:orangebank.ci}
# Minutes before a PROCESSING batch is considered stuck and reset
app.processing.stuck-timeout-minutes=${PROCESSING_STUCK_TIMEOUT:30}
# JWT expire seconds (used for session version claim)
mp.jwt.expire-seconds=3600
# Base URL of the OBA Mobile API gateway (no trailing slash)
quarkus.rest-client."funds-transfer-uemoa-api".url=${FUNDS_TRANSFER_UEMOA_URL:https://orange-fr.temenoscloud.com:442/OBAMobApi/api/v1.0.0/party/mobapi}
quarkus.rest-client."funds-transfer-uemoa-api".connect-timeout=30000
quarkus.rest-client."funds-transfer-uemoa-api".read-timeout=90000
quarkus.rest-client."funds-transfer-uemoa-api".logging.scope=${REST_CLIENT_LOG_SCOPE:headers}
quarkus.rest-client."funds-transfer-uemoa-api".logging.body-limit=4096
# Trust all certificates — required for self-signed Temenos gateway cert (disable in prod with proper cert)
quarkus.rest-client."funds-transfer-uemoa-api".trust-store=${UEMOA_TRUSTSTORE:}
quarkus.rest-client."funds-transfer-uemoa-api".verify-host=${UEMOA_VERIFY_HOST:false}
################################################################################
# T24 CONNECTIVITY PROBE
# TCP socket probe before processing — if T24 is unreachable the batch is
# deferred (reverted to VALIDATED) without touching any rows.
# Set these to match the actual T24 host each processor calls.
################################################################################
# FundsTransfer processor (non-reversal)
ft.processor.t24.host=${FT_T24_HOST:192.168.1.4}
ft.processor.t24.port=${FT_T24_PORT:8085}
# FundsTransferReversal processor (UEMOA gateway)
ft.reversal.processor.t24.host=${FT_REV_T24_HOST:orange-fr.temenoscloud.com}
ft.reversal.processor.t24.port=${FT_REV_T24_PORT:442}
# Shared connection timeout for the probe (milliseconds)
t24.connectivity.timeout-ms=${T24_CONNECT_TIMEOUT_MS:3000}
################################################################################
# REVERSE PROXY (nginx)
# Tells Quarkus it sits behind nginx and should honour forwarded headers.
# Without this, post-login redirects use http:// instead of https://.
################################################################################
quarkus.http.proxy.proxy-address-forwarding=true
quarkus.http.proxy.allow-forwarded=true
quarkus.http.proxy.enable-forwarded-host=true
quarkus.http.proxy.enable-forwarded-prefix=true
