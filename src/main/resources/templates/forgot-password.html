<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Mot de passe oublié - Orange Bank</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link href="/css/auth.css" rel="stylesheet">
    <link href="/images/favicon.ico" rel="shortcut icon"/>
    <script src="/javascript/vendor/lucide.min.js"></script>
</head>
<body>
<div class="auth-card">
    <div class="auth-header">
        <img alt="Orange Bank" class="auth-logo"
             onerror="this.src='https://upload.wikimedia.org/wikipedia/commons/f/fb/Logo_Orange_Bank.svg'"
             src="/images/Logo_Orange_Bank.svg">
        <h1 class="auth-title">Mot de passe oublié</h1>
        <p class="auth-subtitle">Entrez votre adresse e-mail pour recevoir un lien de réinitialisation</p>
    </div>

    <form id="forgotForm">
        <div class="auth-group">
            <label class="auth-label" for="email">Adresse e-mail</label>
            <input autocomplete="email" autofocus class="auth-input" id="email" placeholder="votre.email@orangebank.com"
                   required type="email">
        </div>
        <button class="auth-btn" id="submitBtn" type="submit">
            <i data-lucide="send"></i><span>Envoyer le lien</span>
        </button>
        <a class="auth-btn auth-btn-ghost" href="/login"
           style="text-decoration:none;text-align:center;justify-content:center">
            ← Retour à la connexion
        </a>
    </form>

    <div class="auth-success" id="okBox">
        <i data-lucide="mail-check" style="flex-shrink:0"></i>
        <span>Si cette adresse est enregistrée, vous recevrez un e-mail avec les instructions de réinitialisation dans quelques minutes.</span>
    </div>
    <div class="auth-error" id="errBox">
        <i data-lucide="triangle-alert"></i><span id="errMsg"></span>
    </div>

    <div class="auth-footer">&copy; 2025 Orange Bank</div>
</div>
<script src="/javascript/forgot-password.js"></script>
<script>if (window.lucide) lucide.createIcons();</script>
</body>
</html>
